# version: '3.11'

services:
  db:
    image: postgres:15
    container_name: ecommerce_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-1}
      POSTGRES_DB: ${POSTGRES_DB:-ecommerce}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: ecommerce_app
    restart: always
    environment:
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-1}@db:5432/${POSTGRES_DB:-ecommerce}
      # - DATABASE_URL=postgresql://postgres:1@localhost:5432/ecommerce
      - SECRET_KEY=9e1a90c6792671e626156e542ecda8740c83a17e0b1f237f3f3f2d2b21c2100e
      - SESSION_SECRET=a7f4e7c3aef70b8c6e7d6f5a4b3c2d1e0f9g8h7i6j5k4l3m2n1o0p9q8r7s6t5u
      - DEBUG=True
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - .:/app

  pgadmin:
    image: dpage/pgadmin4
    container_name: ecommerce_pgadmin
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - db

volumes:
  postgres_data:
