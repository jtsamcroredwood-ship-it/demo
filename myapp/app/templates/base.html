<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}E-commerce{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
</head>
<body>
    <header>
        <nav>
            <a href="/">Home</a>
            <a href="/products">Products</a>
            <a href="/cart">Cart</a>
            <a href="/orders">Orders</a>
            {% if request.session.get("user_id") %}
            <span style="font-weight: 600; color: var(--primary);">👤 Logged in</span>
            <form action="/logout" method="post" style="display:inline; margin: 0;">
                <button type="submit" style="background:none; border:none; color:var(--text-main); font-weight:500; cursor:pointer; padding:0; transition: color 0.2s;">Logout</button>
            </form>
            {% else %}
            <a href="/register">Register</a>
            <a href="/login">Login</a>
            {% endif %}
        </nav>
    </header>
    <main>
        {% block content %}{% endblock %}
    </main>
</body>
</html>
