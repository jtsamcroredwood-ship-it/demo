{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
<h1>{{ product.name }}</h1>
<p>{{ product.description }}</p>
<p>Price: ${{ product.price }}</p>
<p>Stock: {{ product.stock }}</p>
{% if product.image_url %}
<img src="{{ product.image_url }}" alt="{{ product.name }}" width="300">
{% endif %}
<form action="/cart/add" method="post" style="margin-top: 15px; margin-bottom: 20px;">
    <input type="hidden" name="product_id" value="{{ product.id }}">
    <label for="quantity">Qty:</label>
    <input type="number" name="quantity" id="quantity" value="1" min="1" max="{{ product.stock }}" style="width: 60px; padding: 0.25rem;">
    <button type="submit">Add to Cart</button>
</form>
<a href="/">Back to Products</a>
{% endblock %}
