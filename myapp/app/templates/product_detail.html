{% extends "base.html" %}
{% block title %}{{ product.name }}{% endblock %}
{% block content %}
<h1>{{ product.name }}</h1>
<p>{{ product.description }}</p>
<p>Price: ${{ product.price }}</p>
<p>Stock: {{ product.stock }}</p>
{% if product.image_url %}
<img src="{{ product.image_url }}" alt="{{ product.name }}" width="300">
{% endif %}
<a href="/">Back to Products</a>
{% endblock %}
