{% extends "base.html" %}
{% block title %}Products{% endblock %}
{% block content %}
<h1>Products</h1>
<div class="product-list">
	{% for product in products %}
	<div class="product-item">
		<h2><a href="/products/{{ product.id }}">{{ product.name }}</a></h2>
		<p>{{ product.description }}</p>
		<p>Price: ${{ product.price }}</p>
		<p>Stock: {{ product.stock }}</p>
		{% if product.image_url %}
		<img src="{{ product.image_url }}" alt="{{ product.name }}" width="150">
		{% endif %}
		<form action="/cart/add" method="post" style="margin-top: 10px;">
			<input type="hidden" name="product_id" value="{{ product.id }}">
			<input type="number" name="quantity" value="1" min="1" max="{{ product.stock }}" style="width: 60px; padding: 0.25rem;">
			<button type="submit">Add to Cart</button>
		</form>
	</div>
	{% endfor %}
</div>
{% endblock %}
